<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-label="Automated GitHub stats and language telemetry">
  <defs>
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9z" fill="none" stroke="#c084fc" stroke-width="2" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-commit" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4" fill="none" stroke="#c084fc" stroke-width="2"/>
      <path d="M3 12h5M16 12h5" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-pr" viewBox="0 0 24 24">
      <circle cx="6" cy="5" r="2" fill="none" stroke="#c084fc" stroke-width="2"/>
      <circle cx="18" cy="19" r="2" fill="none" stroke="#c084fc" stroke-width="2"/>
      <path d="M6 7v12M18 5v6c0 3-2 5-5 5h-1" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-issue" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#c084fc" stroke-width="2"/>
      <path d="M12 7v6M12 17h.01" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-repo" viewBox="0 0 24 24">
      <path d="M6 3h10a3 3 0 0 1 3 3v15H8a3 3 0 0 1-3-3V4a1 1 0 0 1 1-1z" fill="none" stroke="#c084fc" stroke-width="2"/>
      <path d="M8 17h11M9 7h6" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="300" fill="#05070d"/>
  <rect x="22" y="24" width="676" height="252" rx="7" fill="#171925" stroke="#202942" stroke-width="1"/>
  <rect x="712" y="24" width="546" height="252" rx="7" fill="#171925" stroke="#202942" stroke-width="1"/>

  <text x="58" y="72" fill="#7aa7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Tom Lo's GitHub Stats</text>
  <g>
    <use href="#icon-star" x="58" y="76" width="20" height="20"/>
    <text x="94" y="94" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Total Stars Earned:</text>
    <text x="374" y="94" fill="#2dd4bf" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" text-anchor="end">0</text>
    <use href="#icon-commit" x="58" y="114" width="20" height="20"/>
    <text x="94" y="132" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Total Commits:</text>
    <text x="374" y="132" fill="#2dd4bf" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" text-anchor="end">21</text>
    <use href="#icon-pr" x="58" y="152" width="20" height="20"/>
    <text x="94" y="170" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Total PRs:</text>
    <text x="374" y="170" fill="#2dd4bf" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" text-anchor="end">1</text>
    <use href="#icon-issue" x="58" y="190" width="20" height="20"/>
    <text x="94" y="208" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Total Issues:</text>
    <text x="374" y="208" fill="#2dd4bf" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" text-anchor="end">3</text>
    <use href="#icon-repo" x="58" y="228" width="20" height="20"/>
    <text x="94" y="246" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Contributed to (last year):</text>
    <text x="374" y="246" fill="#2dd4bf" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" text-anchor="end">7</text>
  </g>

  <g transform="translate(510 96)">
    <circle cx="62" cy="62" r="54" fill="#22304e"/>
    <circle cx="62" cy="62" r="43" fill="#05070d"/>
    <path d="M62 18a44 44 0 1 1-37 68" fill="none" stroke="#2dd4bf" stroke-width="13" stroke-linecap="round" filter="url(#cardGlow)"/>
    <circle cx="62" cy="62" r="26" fill="#2dd4bf"/>
    <text x="62" y="69" text-anchor="middle" fill="#05070d" font-family="JetBrains Mono, Consolas, monospace" font-size="21" font-weight="900">GH</text>
    <circle cx="62" cy="18" r="6" fill="#7aa7ff"/>
  </g>

  <text x="754" y="78" fill="#7aa7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Most Used Languages</text>
  <clipPath id="barClip">
    <rect x="754" y="112" width="430" height="14" rx="7"/>
  </clipPath>
  <g clip-path="url(#barClip)">
    <rect x="754" y="112" width="202" height="14" fill="#6e4a7e"/>
    <rect x="956" y="112" width="99" height="14" fill="#ff4f2e"/>
    <rect x="1055" y="112" width="27" height="14" fill="#3776ab"/>
    <rect x="1082" y="112" width="26" height="14" fill="#5d87bf"/>
    <rect x="1108" y="112" width="25" height="14" fill="#00add8"/>
    <rect x="1133" y="112" width="51" height="14" fill="#1f2a44"/>
  </g>
  <rect x="754" y="112" width="430" height="14" rx="7" fill="none" stroke="#22304e"/>

  <g>
    <circle cx="742" cy="155" r="8" fill="#6e4a7e"/>
    <text x="760" y="160" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Elixir 46.90%</text>
    <circle cx="1004" cy="155" r="8" fill="#ff4f2e"/>
    <text x="1022" y="160" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Mojo 23.10%</text>
    <circle cx="742" cy="197" r="8" fill="#3776ab"/>
    <text x="760" y="202" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Python 6.30%</text>
    <circle cx="1004" cy="197" r="8" fill="#5d87bf"/>
    <text x="1022" y="202" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">V 6.10%</text>
    <circle cx="742" cy="239" r="8" fill="#00add8"/>
    <text x="760" y="244" fill="#2dd4bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Go 5.80%</text>
  </g>

  <text x="1236" y="262" fill="#64748b" text-anchor="end" font-family="JetBrains Mono, Consolas, monospace" font-size="12">AUTO 2026-05-03 04:09Z / TOP Elixir 46.9%</text>
</svg>
